name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go vet ./...

      - run: go test ./...

      - name: Cross-compile (windows/amd64)
        run: GOOS=windows GOARCH=amd64 go build -o /dev/null .

      - name: Cross-compile (linux/arm64)
        run: GOOS=linux GOARCH=arm64 go build -o /dev/null .
